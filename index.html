<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Neon Dash — Puro Juego</title>
  <style>
    html,body{height:100%;margin:0;background:#06060a;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;color:#fff;overflow:hidden}
    canvas{display:block;width:100%;height:100%}
    /* Mensaje central (se pinta en canvas, esto es solo por seguridad si canvas falla) */
    #fallback {
      position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
      pointer-events:none;font-weight:700;color:#88f;opacity:.02;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="fallback">Toque / Click / Espacio</div>

  <script>
  // --- Variables y setup ---
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', {alpha:true});
  let W = innerWidth, H = innerHeight;
  function resize(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; ground = H - Math.max(72, Math.floor(H*0.12)); }
  addEventListener('resize', resize);
  resize();

  // estado
  let running = false;
  let paused = false;
  let lastTime = 0;
  let spawnTimer = 0;
  let spawnInterval = 1400; // ms
  let baseSpeed = 6;
  let speedMul = 1;
  let dist = 0;
  let best = parseInt(localStorage.getItem('neon_best')||'0',10) || 0;

  // suelo
  let ground = H - Math.max(72, Math.floor(H*0.12));

  // jugador (cubo)
  const player = {
    x: 100,
    y: ground - 56,
    size: 56,
    dy: 0,
    gravity: 1.2,
    jumpForce: -16,
    grounded: true,
    rot: 0
  };

  // obstaculos y particulas
  let obstacles = [];
  let particles = [];

  // util: spawnear obstaculos
  function spawnObstacle(){
    const r = Math.random();
    const gap = 20 + Math.random()*60;
    const baseY = ground;
    if (r < 0.35){
      // bloque
      const h = 40 + Math.random()*100;
      const w = 28 + Math.random()*56;
      obstacles.push({type:'block', x: W + gap, y: baseY - h, w, h});
    } else {
      // pico triangular
      const size = 36 + Math.random()*48;
      obstacles.push({type:'spike', x: W + gap, y: baseY, size});
    }
  }

  // particulas simples
  function spawnParticles(x,y,n){
    for(let i=0;i<n;i++){
      particles.push({x,y,vx:(Math.random()-0.5)*5, vy:-Math.random()*5-1, life:30+Math.random()*30, s:1+Math.random()*3});
    }
  }

  // colisiones AABB
  function rectsCollide(a,b){
    return !(a.x + a.w < b.x || a.x > b.x + b.w || a.y + a.h < b.y || a.y > b.y + b.h);
  }

  // punto en triángulo (para spikes)
  function pointInTriangle(px,py, ax,ay, bx,by, cx,cy){
    const v0x = cx-ax, v0y = cy-ay;
    const v1x = bx-ax, v1y = by-ay;
    const v2x = px-ax, v2y = py-ay;
    const dot00 = v0x*v0x + v0y*v0y;
    const dot01 = v0x*v1x + v0y*v1y;
    const dot02 = v0x*v2x + v0y*v2y;
    const dot11 = v1x*v1x + v1y*v1y;
    const dot12 = v1x*v2x + v1y*v2y;
    const invDenom = 1 / (dot00 * dot11 - dot01 * dot01);
    const u = (dot11 * dot02 - dot01 * dot12) * invDenom;
    const v = (dot00 * dot12 - dot01 * dot02) * invDenom;
    return (u >= 0) && (v >= 0) && (u + v < 1);
  }

  // --- controls: primer input inicia el juego ---
  function jump(){
    if (!running || paused) return;
    if (player.grounded){
      player.dy = player.jumpForce;
      player.grounded = false;
      spawnParticles(player.x + player.size/2, player.y + player.size, 10);
    }
  }

  addEventListener('keydown', e=>{
    if (e.code === 'Space'){
      e.preventDefault();
      if (!running) startGame();
      jump();
    } else if (e.code === 'KeyP'){
      togglePause();
    }
  });

  canvas.addEventListener('mousedown', e=>{
    if (!running) startGame();
    jump();
  });
  canvas.addEventListener('touchstart', e=>{
    e.preventDefault();
    if (!running) startGame();
    jump();
  }, {passive:false});

  // --- start / reset / gameover ---
  function resetGame(){
    running = false;
    paused = false;
    lastTime = 0;
    spawnTimer = 0;
    obstacles = [];
    particles = [];
    dist = 0;
    speedMul = 1;
    player.y = ground - player.size;
    player.dy = 0;
    player.grounded = true;
    player.rot = 0;
  }

  function startGame(){
    if (running) return;
    running = true;
    paused = false;
    lastTime = performance.now();
    // spawn some initial obstacles so it doesn't feel empty
    obstacles = [];
    for(let i=0;i<2;i++) spawnObstacle();
    requestAnimationFrame(loop);
  }

  function gameOver(){
    running = false;
    // guarda mejor puntuación
    const sc = Math.floor(dist);
    if (sc > best){ best = sc; localStorage.setItem('neon_best', best); }
    // pequeña explosión
    spawnParticles(player.x + player.size/2, player.y + player.size/2, 30);
    // reinicia después de un segundo (para probar)
    setTimeout(()=>resetGame(), 700);
  }

  function togglePause(){
    if (!running) return;
    paused = !paused;
    if (!paused){
      lastTime = performance.now();
      requestAnimationFrame(loop);
    }
  }

  // --- bucle principal ---
  function loop(ts){
    if (!running || paused) return;
    const dt = Math.min(50, ts - lastTime);
    lastTime = ts;

    const speed = baseSpeed * speedMul;
    dist += (speed * dt) * 0.01;
    // dificultad progresiva
    speedMul = 1 + Math.min(2.2, dist/900);

    // spawn
    spawnTimer += dt;
    if (spawnTimer > spawnInterval){
      spawnTimer = 0;
      spawnObstacle();
      // pequeño random del intervalo para variedad
      spawnInterval = 1000 + Math.random()*900;
    }

    // fisica jugador
    player.dy += player.gravity;
    player.y += player.dy * (dt/16);
    player.rot += player.dy * 0.015;
    if (player.y + player.size >= ground){
      player.y = ground - player.size;
      player.dy = 0;
      player.grounded = true;
      player.rot = 0;
    }

    // mover obstaculos
    for (let i = obstacles.length -1; i >= 0; i--){
      const o = obstacles[i];
      o.x -= speed * (dt/16);
      if (o.x + (o.w || o.size) < -120) obstacles.splice(i,1);
    }

    // particulas
    for (let i = particles.length -1; i >= 0; i--){
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.18;
      p.life -= 1;
      if (p.life <= 0) particles.splice(i,1);
    }

    // colisiones
    const box = {x:player.x, y:player.y, w:player.size, h:player.size};
    for (const o of obstacles){
      if (o.type === 'block'){
        const rect = {x:o.x, y:o.y, w:o.w, h:o.h};
        if (rectsCollide({x:box.x, y:box.y, w:box.w, h:box.h}, rect)){
          gameOver();
          return;
        }
      } else if (o.type === 'spike'){
        // triángulo en puntos A (o.x, o.y), B (o.x + size/2, o.y - size), C (o.x + size, o.y)
        const ax = o.x, ay = o.y;
        const bx = o.x + o.size/2, by = o.y - o.size;
        const cx = o.x + o.size, cy = o.y;
        // chequea esquinas del cubo
        const corners = [
          [box.x, box.y],
          [box.x + box.w, box.y],
          [box.x, box.y + box.h],
          [box.x + box.w, box.y + box.h]
        ];
        for (const [px,py] of corners){
          if (pointInTriangle(px,py, ax,ay, bx,by, cx,cy)){
            gameOver();
            return;
          }
        }
      }
    }

    draw();
    requestAnimationFrame(loop);
  }

  // --- dibujo ---
  function draw(){
    // clear
    ctx.clearRect(0,0,W,H);

    // fondo sutil
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#071019');
    g.addColorStop(1,'#05050a');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    // grid lineas
    ctx.strokeStyle = 'rgba(255,255,255,0.02)';
    ctx.lineWidth = 1;
    for (let i=0;i<18;i++){
      ctx.beginPath();
      ctx.moveTo(0, i*(H/18));
      ctx.lineTo(W, i*(H/18));
      ctx.stroke();
    }

    // ground
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(0, ground, W, H - ground);

    // obstaculos
    for (const o of obstacles){
      if (o.type === 'block'){
        // neon rect
        ctx.save();
        ctx.shadowBlur = 16; ctx.shadowColor = '#ff5a6a';
        ctx.fillStyle = '#ff6b80';
        roundRect(ctx, o.x, o.y, o.w, o.h, 6); ctx.fill();
        ctx.restore();
      } else if (o.type === 'spike'){
        ctx.save();
        ctx.shadowBlur = 14; ctx.shadowColor = '#ffd24d';
        ctx.fillStyle = '#ffda6b';
        ctx.beginPath();
        ctx.moveTo(o.x, o.y);
        ctx.lineTo(o.x + o.size/2, o.y - o.size);
        ctx.lineTo(o.x + o.size, o.y);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }

    // jugador (cubo rotando)
    ctx.save();
    const cx = player.x + player.size/2, cy = player.y + player.size/2;
    ctx.translate(cx, cy);
    ctx.rotate(player.rot * 0.08);
    ctx.shadowBlur = 22; ctx.shadowColor = '#00f0ff';
    ctx.fillStyle = '#00e8ff';
    roundRect(ctx, -player.size/2, -player.size/2, player.size, player.size, 8);
    ctx.fill();
    ctx.restore();

    // particulas
    for (const p of particles){
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life/60);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.s, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.fill();
      ctx.restore();
    }

    // HUD: puntuación y mejor
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = '20px system-ui, Arial';
    ctx.fillText('Score: ' + Math.floor(dist), 18, 30);
    ctx.fillText('Best: ' + best, 18, 56);

    // Si no está corriendo, pintamos mensaje central
    if (!running){
      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,0.02)';
      ctx.fillRect(W/2 - 160, H/2 - 54, 320, 100);
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.font = '600 20px system-ui, Arial';
      ctx.fillText('Toca / Click / Espacio para empezar', W/2, H/2 - 6);
      ctx.font = '14px system-ui, Arial';
      ctx.fillText('Salta con toque o tecla ESPACIO. Se reinicia al morir.', W/2, H/2 + 18);
      ctx.restore();
    }
  }

  // helper roundRect
  function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  // arranco con reset listo
  resetGame();
  draw();

  // expose for debug (opc)
  try { window.startGame = startGame; window.resetGame = resetGame; } catch(e){}

  </script>
</body>
</html>
