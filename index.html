<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container{
    width:90%;
    max-width:400px;
    text-align:center;
}

.logo{
    font-size:40px;
    font-weight:bold;
    margin-bottom:40px;
}

input{
    width:100%;
    padding:15px;
    margin:10px 0;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.2);
    background:rgba(255,255,255,0.1);
    color:white;
    font-size:16px;
}

input::placeholder{
    color:#ccc;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:25px;
    background:#1877f2;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#145bd1;
}

.link{
    margin-top:20px;
    display:block;
    color:#ddd;
    font-size:14px;
    cursor:pointer;
}

.hidden{
    display:none;
}

</style>
</head>

<body>

<div class="container" id="loginBox">
    <div class="logo">MI ACCESO</div>

    <input type="text" id="user" placeholder="Usuario o correo">
    <input type="password" id="pass" placeholder="Contraseña">

    <button onclick="login()">Iniciar sesión</button>

    <span class="link">¿Olvidaste tu contraseña?</span>
</div>

<div class="container hidden" id="contentBox">
    <h1>Bienvenido 🔥</h1>
    <p>Has iniciado sesión correctamente.</p>

    <img src="Obito Uchiha.jpeg" width="200" style="border-radius:10px; margin-top:20px;">

    <br><br>
    <button onclick="logout()">Cerrar sesión</button>
</div>

<script>
function login(){
    var usuario = document.getElementById("user").value;
    var password = document.getElementById("pass").value;

    // 🔒 Cambia estos datos
    if(usuario === "admin" && password === "1234"){
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("contentBox").classList.remove("hidden");
    } else {
        alert("Datos incorrectos");
    }
}

function logout(){
    document.getElementById("contentBox").classList.add("hidden");
    document.getElementById("loginBox").classList.remove("hidden");
}
</script>

</body>
</html>
