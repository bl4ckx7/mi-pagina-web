<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Página Privada</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #111, #1f1f1f);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.container{
    text-align:center;
    background:#181818;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,255,150,0.4);
    width:90%;
    max-width:400px;
    animation: fadeIn 1s ease-in-out;
}

h1{
    margin-bottom:20px;
}

input{
    width:90%;
    padding:10px;
    border:none;
    border-radius:8px;
    margin-bottom:15px;
    font-size:16px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#00ff99;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#00cc77;
}

img{
    width:200px;
    border-radius:10px;
    margin-top:20px;
}

.hidden{
    display:none;
}

@keyframes fadeIn{
    from{opacity:0; transform:scale(0.9);}
    to{opacity:1; transform:scale(1);}
}
</style>
</head>

<body>

<div class="container" id="loginBox">
    <h1>Acceso Privado</h1>
    <input type="password" id="password" placeholder="Ingresa la contraseña">
    <br>
    <button onclick="checkPassword()">Entrar</button>
    <p id="error" style="color:red;"></p>
</div>

<div class="container hidden" id="contentBox">
    <h1>Bienvenido 🔥</h1>
    <p>Acceso concedido correctamente.</p>
    
    <!-- Cambia el nombre si tu imagen tiene otro nombre -->
    <img src="Obito Uchiha.jpeg" alt="Imagen">

    <br><br>
    <button onclick="logout()">Cerrar Sesión</button>
</div>

<script>
function checkPassword(){
    var pass = document.getElementById("password").value;
    var correctPassword = "c4br3r4132";  // 🔒 CAMBIA ESTA CONTRASEÑA

    if(pass === correctPassword){
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("contentBox").classList.remove("hidden");
    } else {
        document.getElementById("error").innerText = "Contraseña incorrecta";
    }
}

function logout(){
    document.getElementById("contentBox").classList.add("hidden");
    document.getElementById("loginBox").classList.remove("hidden");
}
</script>

</body>
</html>
